services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  memgraph:
    image: memgraph/memgraph:latest
    restart: unless-stopped
    ports:
      - "7687:7687"  # bolt
      - "7444:7444"  # http
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--storage-snapshot-interval-sec=3600", "--storage-snapshot-on-exit=true", "--storage-wal-enabled=true"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7687"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy

volumes:
  postgres_data:
  memgraph_data: memgraph_data:
